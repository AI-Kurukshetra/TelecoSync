    <text x="252" y="554" fill="#03514A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15" font-weight="700">Test intent:</text>
    <text x="348" y="554" fill="#5C6771" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15">create a customer, place an order, link it to inventory, and verify workflows plus integration events.</text>
