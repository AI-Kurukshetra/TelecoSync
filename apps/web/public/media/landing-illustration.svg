    <text x="784" y="364" fill="#081724" font-family="Avenir Next, Segoe UI, sans-serif" font-size="18" font-weight="700">Platform</text>
    <text x="784" y="398" fill="#5C6771" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15">Workflows</text>
    <text x="784" y="426" fill="#5C6771" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15">Events</text>
    <text x="784" y="454" fill="#5C6771" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15">Webhooks</text>
